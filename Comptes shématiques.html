<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tableau de Compte Shématique</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background-color: #f8fafc;
  text-align: center;
}

table {
  width: 80%;
  margin: 0 auto;
  border-collapse: collapse;
  margin-bottom: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}

th { background-color: #ffd700; }

.compte-titre {
  background-color: #ffccd9;
  font-weight: bold;
}

.debit { background-color: #ccffcc; }
.credit { background-color: #fff5b1; }

.total {
  font-weight: bold;
  background-color: #e0e0e0;
}

input {
  width: 90%;
  font-weight: bold;
  text-align: center;
}

button {
  margin: 5px;
  padding: 4px 8px;
  cursor: pointer;
}

.icon-btn {
  background: none;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>Tableau Compte avec Solde Automatique</h2>

<div id="tableauxContainer">

<div class="compte-section">
<table>

<thead>
<tr class="compte-titre">
<td colspan="3"><input type="text" placeholder=" "></td>
</tr>
<tr>
<th>Débit</th>
<th>Crédit</th>
<th>Action</th>
</tr>
</thead>

<tbody>
<tr>
<td class="debit"><input type="number" oninput="calculer(this)"></td>
<td class="credit"><input type="number" oninput="calculer(this)"></td>
<td><button onclick="supprimerLigne(this)">❌</button></td>
</tr>
</tbody>

<tfoot>
<!-- 🔥 SOLDE AVANT TOTAL -->
<tr class="total">
<td class="solde-debit"></td>
<td class="solde-credit"></td>
<td>Solde</td>
</tr>

<tr class="total">
<td class="total-debit">0</td>
<td class="total-credit">0</td>
<td>Total</td>
</tr>
</tfoot>

</table>

<button onclick="ajouterLigne(this)">Ajouter une ligne</button>
</div>

</div>

<button onclick="ajouterCompte()">Ajouter un compte</button>
<button onclick="viderTous()">Vider tous</button>

<script>

function calculer(input){
  const table = input.closest('table');
  const rows = table.querySelectorAll('tbody tr');

  let totalDebit = 0;
  let totalCredit = 0;

  rows.forEach(row=>{
    const debit = parseFloat(row.children[0].querySelector('input').value) || 0;
    const credit = parseFloat(row.children[1].querySelector('input').value) || 0;

    totalDebit += debit;
    totalCredit += credit;
  });

  let soldeDebit = "";
  let soldeCredit = "";

  if(totalDebit > totalCredit){
    soldeCredit = totalDebit - totalCredit;
    totalCredit += soldeCredit;
  } else if(totalCredit > totalDebit){
    soldeDebit = totalCredit - totalDebit;
    totalDebit += soldeDebit;
  }

  table.querySelector('.total-debit').innerText = totalDebit.toFixed(2);
  table.querySelector('.total-credit').innerText = totalCredit.toFixed(2);

  table.querySelector('.solde-debit').innerText = soldeDebit || "";
  table.querySelector('.solde-credit').innerText = soldeCredit || "";
}

// fonctions inchangées
function ajouterLigne(btn){
  const table = btn.previousElementSibling;
  const tbody = table.querySelector('tbody');

  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="debit"><input type="number" oninput="calculer(this)"></td>
    <td class="credit"><input type="number" oninput="calculer(this)"></td>
    <td><button onclick="supprimerLigne(this)">❌</button></td>
  `;
  tbody.appendChild(tr);
}

function supprimerLigne(btn){
  btn.closest('tr').remove();
  calculer(btn);
}

function ajouterCompte(){
  const container = document.getElementById('tableauxContainer');

  const div = document.createElement('div');
  div.className = "compte-section";

  div.innerHTML = `
  <table>
  <thead>
  <tr class="compte-titre">
  <td colspan="3"><input type="text" placeholder="Nouveau compte"></td>
  </tr>
  <tr>
  <th>Débit</th>
  <th>Crédit</th>
  <th>Action</th>
  </tr>
  </thead>

  <tbody>
  <tr>
  <td class="debit"><input type="number" oninput="calculer(this)"></td>
  <td class="credit"><input type="number" oninput="calculer(this)"></td>
  <td><button onclick="supprimerLigne(this)">❌</button></td>
  </tr>
  </tbody>

  <tfoot>
  <tr class="total">
  <td class="solde-debit"></td>
  <td class="solde-credit"></td>
  <td>Solde</td>
  </tr>        

  <tr class="total">
  <td class="total-debit">0</td>
  <td class="total-credit">0</td>
  <td>Total</td>
  </tr>
  </tfoot>

  </table>

  <button onclick="ajouterLigne(this)">Ajouter une ligne</button>
  `;

  container.appendChild(div);
}

function viderTous(){
  document.querySelectorAll('input').forEach(i => i.value = '');
  document.querySelectorAll('.total-debit, .total-credit').forEach(e => e.innerText = '0');
  document.querySelectorAll('.solde-debit, .solde-credit').forEach(e => e.innerText = '');
}

</script>

</body>
</html>
