<script>
function calculerTotals() {
  let totalActif = 0, totalPassif = 0;
  document.querySelectorAll("#tbodyBilan tr").forEach(row => {
    const montantActif = parseFloat(row.cells[1].querySelector("input")?.value) || 0;
    const montantPassif = parseFloat(row.cells[3].querySelector("input")?.value) || 0;
    totalActif += montantActif;
    totalPassif += montantPassif;
  });
  document.getElementById("totalActif").textContent = totalActif.toFixed(2);
  document.getElementById("totalPassif").textContent = totalPassif.toFixed(2);
}

function ajouterLigne() {
  const tbody = document.getElementById("tbodyBilan");
  const row = document.createElement("tr");
  row.innerHTML = `
    <td><input type="text" placeholder="Élément Actif"></td>
    <td><input type="number" step="0.01" oninput="calculerTotals()"></td>
    <td><input type="text" placeholder="Élément Passif"></td>
    <td><input type="number" step="0.01" oninput="calculerTotals()"></td>
    <td class="center"><button class="delete" onclick="viderLigne(this)">🗑️</button></td>
  `;
  tbody.appendChild(row);
}

function viderLigne(btn) {
  const row = btn.closest("tr");
  row.querySelectorAll("input").forEach(input => input.value = "");
  calculerTotals();
}

function viderChamps() {
  document.querySelectorAll("#tbodyBilan input").forEach(input => input.value = "");
  calculerTotals();
}

calculerTotals();
