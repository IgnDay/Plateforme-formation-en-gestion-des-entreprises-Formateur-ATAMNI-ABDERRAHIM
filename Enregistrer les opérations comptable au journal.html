<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Journal Comptable</title>
<style>
  body { font-family: Arial, sans-serif; background-color: #f8fafc; margin: 30px; }
  h2 { text-align:center; margin-top:30px; }
  .operation { border: 2px solid #ccc; border-radius: 10px; padding: 15px; margin-bottom: 25px; background: #fff; box-shadow: 2px 2px 8px rgba(0,0,0,0.1); }
  table { width:100%; border-collapse: collapse; }
  td { border: 1px solid #ccc; padding:6px; font-size:14px; }
  td:nth-child(1), td:nth-child(2){ width:8%; }
  td:nth-child(3){ width:35%; text-align:left; }
  td:nth-child(4), td:nth-child(5){ width:12%; text-align:right; }
  td:nth-child(6){ width:5%; }
  td.col1, td.col4{ background-color:#e6f2ff; }
  td.col2, td.col5{ background-color:#ffe6ee; }
  td.col3{ background-color:#fff8cc; }
  input.cell{ width:100%; border:none; background:transparent; outline:none; font-size:14px; text-align:inherit; font-weight:bold; }
  .btn{ margin:6px 4px; padding:6px 12px; border:none; border-radius:6px; font-weight:bold; cursor:pointer; }
  .btn-add-line{ background-color:#2563eb; color:white; }
  .btn-del{ background-color:#dc2626; color:white; }
  .btn-del-op{ background-color:#b91c1c; color:white; }
  .btn-new-op{ background-color:#16a34a; color:white; }
  .btn-export{ background-color:#f59e0b; color:white; }
  .btn-save{ background-color:#0ea5e9; color:white; }
  .btn-clear{ background-color:#6b7280; color:white; }
</style>
</head>

<body>

<h2>Journal Comptable</h2>
<div id="operations"></div>

<div style="text-align:center; margin-top:10px;">
  <button class="btn btn-new-op" id="btnNewOp">➕ Nouvelle opération</button>
  
  <button class="btn btn-clear" id="btnClear">🧹 Vider les champs</button>
</div>

<script>
let opCount = 0;
const container = document.getElementById("operations");
const btnNewOp = document.getElementById("btnNewOp");
const btnSave = document.getElementById("btnSave");
const btnClear = document.getElementById("btnClear");

// --- Ajouter ligne ---
function addLine(tbody,rowData=["","","","",""]){
  const tr=document.createElement("tr");
  tr.innerHTML=`
    <td class="col1"><input class="cell" type="text" value="${rowData[0]||""}"></td>
    <td class="col2"><input class="cell" type="text" value="${rowData[1]||""}"></td>
    <td class="col3"><input class="cell" type="text" value="${rowData[2]||""}"></td>
    <td class="col4"><input class="cell" type="text" value="${rowData[3]||""}"></td>
    <td class="col5"><input class="cell" type="text" value="${rowData[4]||""}"></td>
    <td><button class="btn btn-del">❌</button></td>
  `;
  tr.querySelector(".btn-del").onclick=()=>tr.remove();
  tbody.appendChild(tr);
}

// --- Ligne Date (SEULE MODIFICATION) ---
function addDateLine(tbody){
  const tr=document.createElement("tr");
  tr.innerHTML=`<td colspan="6" style="text-align:center; font-weight:bold; background-color:#d1fae5;">
    <input class="cell" type="date" style="width:auto; text-align:center;">
  </td>`;
  tbody.appendChild(tr);
}

// --- Créer opération ---
function createOperation(data=[]){
  opCount++;
  const div=document.createElement("div"); 
  div.className="operation";

  div.innerHTML=`
    <table><tbody></tbody></table>
    <div style="text-align:center; margin-top:5px;">
      <button class="btn btn-add-line">+ Ajouter une ligne</button>
      <button class="btn btn-del-op">❌ Supprimer l'opération</button>
    </div>
  `;

  container.appendChild(div);

  const tbody=div.querySelector("tbody");
  div.querySelector(".btn-add-line").onclick=()=>addLine(tbody);
  div.querySelector(".btn-del-op").onclick=()=>div.remove();

  addDateLine(tbody);

  if(data.length>0) data.forEach(row=>addLine(tbody,row));
  else addLine(tbody);
}


// --- Vider ---
btnClear.onclick=()=>{
  if(confirm("Vider tous les champs ?")){
    localStorage.removeItem("journalComptable");
    container.innerHTML="";
    createOperation();
  }
};

// --- Nouvelle opération ---
btnNewOp.onclick=()=>createOperation();

// --- Charger ---
function loadSavedData(){
  const saved=localStorage.getItem("journalComptable");
  if(saved) JSON.parse(saved).forEach(op=>createOperation(op));
  else createOperation();
}
loadSavedData();
</script>
<br>

<a href="compta.html">⬅ Retour</a>

</body>
</html>
