<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bilan Interactif Aligné - Actif / Passif</title>

<style>
body {font-family: Arial, sans-serif; background: #f8fafc; margin: 20px; color: #1e293b;}
h1 {text-align: center; color: #0f766e; margin-bottom: 20px;}
table {width: 100%; border-collapse: collapse;}
th, td {border: 1px solid #cbd5e1; padding: 6px; font-size: 14px; vertical-align: top;}
th {background-color: #e0f2fe; text-align: center;}
td input[type="text"] {width: 90%; border: 1px solid #cbd5e1; border-radius: 4px; padding: 4px;}
.btn {background-color: #0f766e; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-left: 4px;}
.btn:hover {background-color: #0e7490;}
.totaux {font-weight: bold; background-color: #f1f5f9;}
.center {text-align: center;}
.classe-header {background-color: #bae6fd; font-weight: bold;}
.toolbar {display:flex; justify-content:flex-end; gap:6px; margin-bottom:10px;}
#confirmation {color: green; font-weight: bold; display: none; margin-left: 10px;}

.ok-equal { color: green; }
.not-equal { color: red; }

col.actif {width:35%;}
col.actifMontant {width:15%;}
col.passif {width:35%;}
col.passifMontant {width:15%;}
</style>
</head>

<body>

<h1>Bilan Actif / Passif</h1>



<table>
<colgroup>
<col class="actif">
<col class="actifMontant">
<col class="passif">
<col class="passifMontant">
</colgroup>

<thead>
<tr>
<th>ACTIF</th>
<th>Montant</th>
<th>PASSIF</th>
<th>Montant</th>
</tr>
</thead>

<tbody id="bilanBody"></tbody>

<tfoot>
<tr class="totaux">
<td class="center">Total Actif</td>
<td id="totalActif" class="center">0,00</td>
<td class="center">Total Passif</td>
<td id="totalPassif" class="center">0,00</td>
</tr>
</tfoot>
</table>

<script>
const classes = {
actif: [
{ id: 2, label: 'Classe 2 — Actif immobilisé' },
{ id: 3, label: 'Classe 3 — Actif circulant' },
{ id: 5, label: 'Classe 5 — Trésorerie (Actif)' }
],
passif: [
{ id: 1, label: 'Classe 1 — Financement permanent' },
{ id: 4, label: 'Classe 4 — Passif circulant' },
{ id: 5, label: 'Classe 5 — Trésorerie (Passif)' }
]
};

let lignes = JSON.parse(localStorage.getItem('bilan_classes') || '{}');
if (!lignes.actif) lignes = {actif:{2:[],3:[],5:[]}, passif:{1:[],4:[],5:[]}};

function renderTable() {
const tbody = document.getElementById('bilanBody');
tbody.innerHTML = '';

const rowsActif = [];
classes.actif.forEach(a=>{
rowsActif.push({type:'header', id:a.id, label:a.label});
lignes.actif[a.id].forEach((l,i)=>rowsActif.push({type:'ligne', id:a.id, index:i}));
});

const rowsPassif = [];
classes.passif.forEach(p=>{
rowsPassif.push({type:'header', id:p.id, label:p.label});
lignes.passif[p.id].forEach((l,i)=>rowsPassif.push({type:'ligne', id:p.id, index:i}));
});

const maxRows = Math.max(rowsActif.length, rowsPassif.length);

for(let i=0;i<maxRows;i++){
const tr = document.createElement('tr');
const aRow = rowsActif[i];
const pRow = rowsPassif[i];

// ACTIF
if(aRow){
if(aRow.type==='header'){
tr.innerHTML += `<td colspan='2' class='classe-header'>${aRow.label} <button class='btn' onclick='ajouterLigne("actif",${aRow.id})'>+ Ligne</button></td>`;
} else {
const l = lignes.actif[aRow.id][aRow.index];
tr.innerHTML += `<td><input type='text' value='${l.compte||''}' onchange='majLigne("actif",${aRow.id},${aRow.index},"compte",this.value)'></td>`;
tr.innerHTML += `<td><input type='text' value='${l.montant||''}' 
oninput='majLigne("actif",${aRow.id},${aRow.index},"montant",this.value)'>
<button class='btn' onclick='supprimerLigne("actif",${aRow.id},${aRow.index})'>🗑</button></td>`;
}
} else { tr.innerHTML += '<td></td><td></td>'; }

// PASSIF
if(pRow){
if(pRow.type==='header'){
tr.innerHTML += `<td colspan='2' class='classe-header'>${pRow.label} <button class='btn' onclick='ajouterLigne("passif",${pRow.id})'>+ Ligne</button></td>`;
} else {
const l = lignes.passif[pRow.id][pRow.index];
tr.innerHTML += `<td><input type='text' value='${l.compte||''}' onchange='majLigne("passif",${pRow.id},${pRow.index},"compte",this.value)'></td>`;
tr.innerHTML += `<td><input type='text' value='${l.montant||''}' 
oninput='majLigne("passif",${pRow.id},${pRow.index},"montant",this.value)'>
<button class='btn' onclick='supprimerLigne("passif",${pRow.id},${pRow.index})'>🗑</button></td>`;
}
} else { tr.innerHTML += '<td></td><td></td>'; }

tbody.appendChild(tr);
}

majTotaux();
}

function ajouterLigne(side,id){
lignes[side][id].push({compte:'', montant:''});
renderTable();
}

function supprimerLigne(side,id,index){
lignes[side][id].splice(index,1);
renderTable();
}

function majLigne(side,id,index,champ,valeur){
lignes[side][id][index][champ]=valeur;
majTotaux();
}

function majTotaux(){
const totalActif = Object.values(lignes.actif).flat().reduce((s,l)=>s+(parseFloat(l.montant)||0),0);
const totalPassif = Object.values(lignes.passif).flat().reduce((s,l)=>s+(parseFloat(l.montant)||0),0);

const actifEl = document.getElementById('totalActif');
const passifEl = document.getElementById('totalPassif');

actifEl.textContent = totalActif.toLocaleString('fr-FR',{minimumFractionDigits:2});
passifEl.textContent = totalPassif.toLocaleString('fr-FR',{minimumFractionDigits:2});

actifEl.classList.remove("ok-equal","not-equal");
passifEl.classList.remove("ok-equal","not-equal");

if(totalActif === totalPassif){
actifEl.classList.add("ok-equal");
passifEl.classList.add("ok-equal");
} else {
actifEl.classList.add("not-equal");
passifEl.classList.add("not-equal");
}
}

function sauvegarder(){
localStorage.setItem('bilan_classes', JSON.stringify(lignes));
}



renderTable();
</script>
<br>

<a href="index.html">⬅ Retour accueil</a>

</body>
</html>
